name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.17.0-dev.1099+7db2ef610"
      - run: zig fmt --check .
      - run: zig build test
      - run: zig build wasm
